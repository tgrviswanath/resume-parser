name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  test-nlp-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install nlp-service deps
        run: |
          pip install -r nlp-service/requirements.txt ruff
          python -m spacy download en_core_web_sm
      - name: Lint
        run: ruff check nlp-service/
      - name: Run nlp-service tests
        run: pytest tests/nlp-service/ -v

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install backend deps
        run: pip install -r backend/requirements.txt pytest pytest-asyncio httpx
      - name: Run backend tests
        run: pytest tests/backend/ -v

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Install and test
        run: |
          cd frontend
          npm install
          npm test -- --watchAll=false
